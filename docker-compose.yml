version: '3.8'

services:
  ofkms-api:
    container_name: ofkms-api
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "12830:12830"
    networks:
      - docker_default
    environment:
      - API_PORT=12830
      - API_HOST=0.0.0.0
      # Backend services via Docker container names (internal port 8000)
      - LLM_BASE_URL=http://vllm_qwen3_32b:8000/v1
      - LLM_MODEL=/opt/models/qwen3-32b
      - LLM_TIMEOUT=60
      - BGE_M3_BASE_URL=http://bge-m3-server:8000
      - BGE_M3_TIMEOUT=10
      - OFCODE_BASE_URL=http://ofcode-server:8000
      - OFCODE_TIMEOUT=10
      - NEO4J_URI=bolt://neo4j-graphrag:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=graphrag2024
      - POSTGRES_HOST=postgres-kms
      - POSTGRES_PORT=5432
      - POSTGRES_DB=ragdb
      - POSTGRES_USER=raguser
      - POSTGRES_PASSWORD=ragpassword123
      - FALLBACK_THRESHOLD=0.3
      - SEARCH_TOP_K=10
      - API_KEYS=ofkms-eRCAVjRnHj4j6qTTvLuHxq1JK0ObuE2UFXgcdV5q2P8
      - SUMMARIES_PATH=/data/summaries
    volumes:
      - /raid/users/ofuser/work/ijswork/gpubase-raphrag-new/uploads/summaries:/data/summaries:ro
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:12830/', timeout=5)\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

networks:
  docker_default:
    external: true
